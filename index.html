<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoLive - MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-violet-600 rounded-2xl flex items-center justify-center text-3xl font-bold">C</div>
                <h1 class="text-4xl font-bold">CoLive</h1>
            </div>
            <button onclick="alert('Вход в демо-режим')" class="bg-white text-black px-6 py-3 rounded-2xl font-medium">Войти</button>
        </header>

        <h1 class="text-6xl font-bold mb-4">Живи с комфортными соседями</h1>
        <p class="text-xl text-zinc-400 mb-12">Простой MVP для совместной аренды</p>

        <div class="grid md:grid-cols-3 gap-8" id="cards"></div>
    </div>

    <script>
        const data = [
            {name: "Алексей Морозов", compat: 96, desc: "Программист, 26 лет, Москва"},
            {name: "Мария Соколова", compat: 91, desc: "Дизайнер, 24 года, СПб"},
            {name: "Дмитрий Ковалёв", compat: 87, desc: "Маркетолог, 28 лет, Москва"}
        ];

        function render() {
            const container = document.getElementById("cards");
            container.innerHTML = data.map(item => `
                <div class="bg-zinc-900 rounded-3xl p-8 card">
                    <div class="text-emerald-400 text-6xl font-bold mb-6">${item.compat}%</div>
                    <div class="text-3xl font-semibold mb-3">${item.name}</div>
                    <p class="text-zinc-400 mb-8">${item.desc}</p>
                    <button onclick="like('${item.name}')" 
                            class="w-full py-5 bg-violet-600 hover:bg-violet-700 rounded-2xl text-lg font-medium">
                        ❤️ Нравится
                    </button>
                </div>
            `).join('');
        }

        function like(name) {
            alert(`❤️ Ты лайкнул ${name}! Матч создан.`);
        }

        window.onload = render;
    </script>
</body>
</html>
